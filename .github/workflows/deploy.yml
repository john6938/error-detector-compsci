name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: error-detector-client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: error-detector-client

      - name: Build
        run: npm run build
        working-directory: error-detector-client
        env:
          BASE_URL: /error-detector-compsci/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: error-detector-client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
